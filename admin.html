<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>留言板后台管理</title>
    <script src="https://cdn.jsdelivr.net/npm/sqlite3-wasm@0.8.0/dist/sqlite3.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f0f5ff;padding:15px;}
        /* 后台居中容器 */
        .admin-box{
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
            background: #fff;
            border-radius: 18px;
            padding: 20px;
        }
        .admin-title{
            text-align: center;
            color: #2563eb;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .back-link{
            text-align: center;
            margin: 15px 0;
        }
        .back-link a{
            color: #2563eb;
            text-decoration: none;
        }
        /* 后台留言条目 */
        .admin-ly{
            padding: 15px;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }
        .state-show{color:green;}
        .state-hide{color:orange;}
        /* 操作按钮样式 */
        .btn-del{
            display:inline-block;
            padding:4px 10px;
            background:#ef4444;
            color:#fff;
            border-radius:6px;
            font-size:13px;
            text-decoration:none;
            margin:5px 5px 0 0;
        }
        .btn-hide{
            display:inline-block;
            padding:4px 10px;
            background:#f59e0b;
            color:#fff;
            border-radius:6px;
            font-size:13px;
            text-decoration:none;
        }
        .btn-open{
            display:inline-block;
            padding:4px 10px;
            background:#10b981;
            color:#fff;
            border-radius:6px;
            font-size:13px;
            text-decoration:none;
        }
        .empty-admin{
            text-align:center;color:#999;padding:30px 0;
        }
        /* 简易登录弹窗 */
        .login-wrap{
            position:fixed;
            top:0;left:0;
            width:100%;height:100%;
            background:rgba(0,0,0,0.3);
            display:flex;justify-content:center;align-items:center;
        }
        .login-card{
            background:#fff;padding:25px;border-radius:15px;width:85%;max-width:400px;
        }
        .login-card input{
            width:100%;padding:12px;margin:15px 0;border:1px solid #ddd;border-radius:10px;
        }
        .login-card button{
            width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:10px;
        }
    </style>
</head>
<body>
    <!-- 后台登录界面 -->
    <div class="login-wrap" id="loginBox">
        <div class="login-card">
            <h3 style="text-align:center;margin-bottom:10px">管理员登录</h3>
            <input type="password" id="adminPwd" placeholder="输入后台密码">
            <button onclick="adminLogin()">确认登录</button>
        </div>
    </div>

    <!-- 后台主内容 -->
    <div class="admin-box" id="adminMain" style="display:none;">
        <h2 class="admin-title">留言后台管理系统</h2>
        <div id="adminList"></div>
        <div class="back-link">
            <a href="index.html">返回前台留言页面</a>
        </div>
    </div>

<script>
// 后台管理密码 可自行修改
const ADMIN_PWD = "123456";
let db;
let loginStatus = false;

// 数据库初始化
window.onload = async function(){
    const sqlite = await sqlite3InitModule();
    db = new sqlite.OpfsDb("lyb.db");
}

// 管理员登录验证
function adminLogin(){
    let pwd = document.getElementById("adminPwd").value;
    if(pwd === ADMIN_PWD){
        loginStatus = true;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminMain").style.display = "block";
        // 加载全部留言数据
        loadAllLiuyan();
    }else{
        alert("密码错误，请重新输入！");
    }
}

// 加载所有留言（包含隐藏）
function loadAllLiuyan(){
    let html = "";
    let res = db.exec("SELECT * FROM liuyan ORDER BY id DESC");
    if(res[0].values.length === 0){
        html = '<div class="empty-admin">暂无任何留言数据</div>';
    }else{
        res[0].values.forEach(item=>{
            let id = item[0];
            let name = item[1];
            let content = item[2];
            let time = item[3];
            let show = item[4];
            let stateText = show == 1 ? '<span class="state-show">正常展示</span>' : '<span class="state-hide">已隐藏</span>';
            let btnHtml = "";
            if(show == 1){
                btnHtml = `<a class="btn-hide" onclick="hideLy(${id})">隐藏留言</a>`;
            }else{
                btnHtml = `<a class="btn-open" onclick="openLy(${id})">恢复展示</a>`;
            }
            html += `
            <div class="admin-ly">
                <p>昵称：${name}</p>
                <p>内容：${content}</p>
                <p>时间：${time}</p>
                <p>状态：${stateText}</p>
                <div>
                    <a class="btn-del" onclick="delLy(${id})">永久删除</a>
                    ${btnHtml}
                </div>
            </div>
            `;
        })
    }
    document.getElementById("adminList").innerHTML = html;
}

// 删除留言
function delLy(id){
    if(!confirm("确定永久删除这条留言？无法恢复！")) return;
    db.exec(`DELETE FROM liuyan WHERE id=${id}`);
    loadAllLiuyan();
}

// 隐藏留言
function hideLy(id){
    db.exec(`UPDATE liuyan SET is_show=0 WHERE id=${id}`);
    loadAllLiuyan();
}

// 恢复留言
function openLy(id){
    db.exec(`UPDATE liuyan SET is_show=1 WHERE id=${id}`);
    loadAllLiuyan();
}
</script>
</body>
</html>
